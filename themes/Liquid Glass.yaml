Liquid Glass:
  modes:
    light:
      background-image: "center / cover no-repeat fixed url('https://raw.githubusercontent.com/Nezz/homeassistant-visionos-theme/refs/heads/static/macOS_26_Light.webp')"
      primary-background-color: rgb(76, 80, 84)
      secondary-background-color: rgb(76, 80, 84)
      app-header-background-color: rgba(76, 80, 84, 0.3)
      ha-card-background: rgba(150, 150, 150, 0.3)
      app-theme-color: rgb(91, 138, 168)
    dark:
      background-image: "center / cover no-repeat fixed url('https://raw.githubusercontent.com/Nezz/homeassistant-visionos-theme/refs/heads/static/macOS_26_Dark.webp')"
      primary-background-color: rgb(0, 0, 0)
      secondary-background-color: rgb(18, 11, 25)
      app-header-background-color: rgba(18, 11, 25, 0.3)
      ha-card-background: rgba(0, 0, 0, 0.3)
      app-theme-color: rgb(0, 0, 0)

  # Global
  lovelace-background: "#000000"
  light-primary-color: "#B6B6C1"
  divider-color: rgba(152, 152, 157, 0.3)
  accent-color: var(--primary-color)

  # Font (Montserrat)
  paper-font-common-base_-_font-family: "Montserrat, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
  paper-font-common-code_-_font-family: "Montserrat, monospace"
  mdc-typography-font-family: "Montserrat, system-ui, sans-serif"

  # Text
  primary-text-color: rgba(255, 255, 255, 0.96)
  secondary-text-color: rgba(222, 222, 222, 0.96)
  text-primary-color: var(--primary-text-color)
  disabled-text-color: rgba(208, 208, 208, 0.5)
  text-dark-color: var(--primary-text-color)

  # Sidebar Menu
  sidebar-background-color: var(--secondary-background-color)
  sidebar-icon-color: var(--light-primary-color)
  sidebar-text-color: "#F1F1F1"
  sidebar-selected-background-color: var(--primary-background-color)
  sidebar-selected-icon-color: var(--primary-text-color)
  sidebar-selected-text-color: var(--sidebar-selected-icon-color)

  # States and Badges
  state-icon-color: var(--primary-text-color)
  state-icon-active-color: var(--yellow-color)
  state-icon-unavailable-color: var(--disabled-text-color)
  state-inactive-color: var(--disabled-text-color)
  paper-item-icon-active-color: var(--state-icon-active-color)

  # Cards
  card-background-color: var(--secondary-background-color)
  paper-listbox-background-color: var(--primary-background-color)
  ha-card-border-radius: 34px
  paper-card-background-color: var(--ha-card-background)
  ha-card-border-width: 0
  ha-card-backdrop-filter: blur(8px)

  ha-card-box-shadow: >
    3px 3px 0.5px -3.5px rgba(255, 255, 255, 0.30) inset,
    -2px -2px 0.5px -2px rgba(255, 255, 255, 0.30) inset,
    0 0 8px 1px rgba(255, 255, 255, 0.10) inset,
    0 0 2px 0 rgba(0, 0, 0, 0.10)

  # Colors
  red-color: "#FF453A"
  pink-color: "#FF375F"
  purple-color: "#BF5AF2"
  blue-color: "#0A84FF"
  green-color: "#32D74B"
  yellow-color: "#FFD60A"
  orange-color: "#FF9F0A"

  primary-color: var(--purple-color)

  # Custom
  mcg-title-letter-spacing: 0.08em

  card-mod-theme: "Liquid Glass"
  card-mod-card-yaml: |
    .: |
      ha-card {
        backdrop-filter: unset !important;
      }
      ha-card::before {
        content: '';
        position: absolute;
        inset: 0;
        backdrop-filter: var(--ha-card-backdrop-filter);
        z-index: -1;
        pointer-events: none;
        border-radius: inherit;
        box-shadow: var(--ha-card-box-shadow);
      }
